name: Deploy Cloud Run Job

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-east1
  GAR_LOCATION: asia-east1
  GAR_REPOSITORY: financial-system
  JOB_NAME: financial-system
  RUNTIME_SERVICE_ACCOUNT: financial-runner@dean-finance-report-2026.iam.gserviceaccount.com
  IMAGE_NAME: asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-system/financial-system
  SCHEDULER_JOB_PREFIX: financial-system
  SCHEDULER_TIME_ZONE: Asia/Taipei

jobs:
  test:
    name: Check Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cloud.txt

      - name: Compile source
        run: python -m compileall financial_system main.py

  deploy:
    name: Build and Deploy Job
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Cloud Run Job
        run: |
          NEWS_LOCALES_VALUE="${NEWS_LOCALES:-US;TW;JP;KR}"
          NEWS_LOCALES_VALUE="${NEWS_LOCALES_VALUE//,/;}"
          ENV_VARS="FINANCIAL_TIMEZONE=Asia/Taipei,OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.5},OPENAI_API_KEY=${OPENAI_API_KEY},KEYWORD_LIMIT=${KEYWORD_LIMIT:-20},KEYWORD_QUERY_LIMIT=${KEYWORD_QUERY_LIMIT:-14},KEYWORD_SECONDARY_LIMIT=${KEYWORD_SECONDARY_LIMIT:-8},POLICY_QUERY_LIMIT=${POLICY_QUERY_LIMIT:-24},POLICY_COMPANY_QUERY_LIMIT=${POLICY_COMPANY_QUERY_LIMIT:-32},LONG_TERM_TREND_QUERY_LIMIT=${LONG_TERM_TREND_QUERY_LIMIT:-14},GOOGLE_SHEET_MONITOR_ENABLED=${GOOGLE_SHEET_MONITOR_ENABLED:-true},GOOGLE_SHEET_MONITOR_URL=${GOOGLE_SHEET_MONITOR_URL},GOOGLE_SHEET_EXPORT_ENABLED=${GOOGLE_SHEET_EXPORT_ENABLED:-true},GOOGLE_SHEET_STATE_BACKEND=${GOOGLE_SHEET_STATE_BACKEND:-true},GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID:-1_w31qxAogDkc8_Dtm8aLBH53uhAZYf7e-IFm5NMombA},GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-financial-system-reports},GCS_REPORT_PREFIX=${GCS_REPORT_PREFIX:-daily_reports/},REPORT_TARGET_WORDS=${REPORT_TARGET_WORDS:-1500},NEWS_QUERY_LIMIT=${NEWS_QUERY_LIMIT:-60},NEWS_LIMIT_PER_QUERY=${NEWS_LIMIT_PER_QUERY:-2},NEWS_MAX_AGE_DAYS=${NEWS_MAX_AGE_DAYS:-7},NEWS_LOCALES=${NEWS_LOCALES_VALUE},SOURCE_NEWS_LIMIT=${SOURCE_NEWS_LIMIT:-20},REPORT_CONTEXT_MIN=${REPORT_CONTEXT_MIN:-3},LOG_LEVEL=INFO"
          CLOUD_SQL_FLAGS=()

          if [ -n "${CLOUD_SQL_CONNECTION_NAME}" ]; then
            ENV_VARS="${ENV_VARS},CLOUD_SQL_CONNECTION_NAME=${CLOUD_SQL_CONNECTION_NAME}"
            CLOUD_SQL_FLAGS=(--set-cloudsql-instances="${CLOUD_SQL_CONNECTION_NAME}")
          fi

          gcloud run jobs deploy "${JOB_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE_NAME}:${GITHUB_SHA}" \
            --tasks=1 \
            --max-retries=1 \
            --memory=1Gi \
            --task-timeout=3600s \
            --service-account="${RUNTIME_SERVICE_ACCOUNT}" \
            --set-env-vars="${ENV_VARS}" \
            "${CLOUD_SQL_FLAGS[@]}" \
            --quiet
        env:
          CLOUD_SQL_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          KEYWORD_LIMIT: ${{ secrets.KEYWORD_LIMIT }}
          KEYWORD_QUERY_LIMIT: ${{ secrets.KEYWORD_QUERY_LIMIT }}
          KEYWORD_SECONDARY_LIMIT: ${{ secrets.KEYWORD_SECONDARY_LIMIT }}
          POLICY_QUERY_LIMIT: ${{ secrets.POLICY_QUERY_LIMIT }}
          POLICY_COMPANY_QUERY_LIMIT: ${{ secrets.POLICY_COMPANY_QUERY_LIMIT }}
          LONG_TERM_TREND_QUERY_LIMIT: ${{ secrets.LONG_TERM_TREND_QUERY_LIMIT }}
          GOOGLE_SHEET_MONITOR_ENABLED: ${{ secrets.GOOGLE_SHEET_MONITOR_ENABLED }}
          GOOGLE_SHEET_MONITOR_URL: ${{ secrets.GOOGLE_SHEET_MONITOR_URL }}
          GOOGLE_SHEET_EXPORT_ENABLED: ${{ secrets.GOOGLE_SHEET_EXPORT_ENABLED }}
          GOOGLE_SHEET_STATE_BACKEND: ${{ secrets.GOOGLE_SHEET_STATE_BACKEND }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GCS_REPORT_PREFIX: ${{ secrets.GCS_REPORT_PREFIX }}
          REPORT_TARGET_WORDS: ${{ secrets.REPORT_TARGET_WORDS }}
          NEWS_QUERY_LIMIT: ${{ secrets.NEWS_QUERY_LIMIT }}
          NEWS_LIMIT_PER_QUERY: ${{ secrets.NEWS_LIMIT_PER_QUERY }}
          NEWS_MAX_AGE_DAYS: ${{ secrets.NEWS_MAX_AGE_DAYS }}
          NEWS_LOCALES: ${{ secrets.NEWS_LOCALES }}
          SOURCE_NEWS_LIMIT: ${{ secrets.SOURCE_NEWS_LIMIT }}
          REPORT_CONTEXT_MIN: ${{ secrets.REPORT_CONTEXT_MIN }}

      - name: Ensure daily schedulers
        continue-on-error: true
        run: |
          RUN_URI="https://${GCP_REGION}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${GCP_PROJECT_ID}/jobs/${JOB_NAME}:run"
          declare -A SCHEDULES=(
            ["${SCHEDULER_JOB_PREFIX}-0830"]="30 8 * * *"
            ["${SCHEDULER_JOB_PREFIX}-1100"]="0 11 * * *"
            ["${SCHEDULER_JOB_PREFIX}-1400"]="0 14 * * *"
          )

          for SCHEDULER_JOB_NAME in "${!SCHEDULES[@]}"; do
            SCHEDULER_SCHEDULE="${SCHEDULES[$SCHEDULER_JOB_NAME]}"
            if gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" --project="${GCP_PROJECT_ID}" --location="${GCP_REGION}" >/dev/null 2>&1; then
              gcloud scheduler jobs update http "${SCHEDULER_JOB_NAME}" \
                --project="${GCP_PROJECT_ID}" \
                --location="${GCP_REGION}" \
                --schedule="${SCHEDULER_SCHEDULE}" \
                --time-zone="${SCHEDULER_TIME_ZONE}" \
                --uri="${RUN_URI}" \
                --http-method=POST \
                --oauth-service-account-email="${RUNTIME_SERVICE_ACCOUNT}" \
                --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" \
                --quiet
            else
              gcloud scheduler jobs create http "${SCHEDULER_JOB_NAME}" \
                --project="${GCP_PROJECT_ID}" \
                --location="${GCP_REGION}" \
                --schedule="${SCHEDULER_SCHEDULE}" \
                --time-zone="${SCHEDULER_TIME_ZONE}" \
                --uri="${RUN_URI}" \
                --http-method=POST \
                --oauth-service-account-email="${RUNTIME_SERVICE_ACCOUNT}" \
                --oauth-token-scope="https://www.googleapis.com/auth/cloud-platform" \
                --quiet
            fi

            SCHEDULER_STATE="$(gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" \
              --project="${GCP_PROJECT_ID}" \
              --location="${GCP_REGION}" \
              --format="value(state)")"
            if [ "${SCHEDULER_STATE}" != "ENABLED" ]; then
              gcloud scheduler jobs resume "${SCHEDULER_JOB_NAME}" \
                --project="${GCP_PROJECT_ID}" \
                --location="${GCP_REGION}" \
                --quiet
            fi
          done

          for LEGACY_SCHEDULER_JOB_NAME in "${SCHEDULER_JOB_PREFIX}-daily" "${SCHEDULER_JOB_PREFIX}-0845" "${SCHEDULER_JOB_PREFIX}-0900" "${SCHEDULER_JOB_PREFIX}-1130"; do
            if gcloud scheduler jobs describe "${LEGACY_SCHEDULER_JOB_NAME}" --project="${GCP_PROJECT_ID}" --location="${GCP_REGION}" >/dev/null 2>&1; then
              gcloud scheduler jobs delete "${LEGACY_SCHEDULER_JOB_NAME}" \
                --project="${GCP_PROJECT_ID}" \
                --location="${GCP_REGION}" \
                --quiet
            fi
          done

      - name: Show deployed job
        run: |
          gcloud run jobs describe "${JOB_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --format="value(metadata.name,status.latestCreatedExecution.name)"
